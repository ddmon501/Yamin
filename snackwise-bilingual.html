<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Snackwise</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Archivo+Black&display=swap');
:root{ --ink:#16140F; --paper:#F4F2EC; --card:#FFFFFF; --green:#1F7A4D; --grape:#6E3FA3; }
*{box-sizing:border-box;}
html,body{margin:0;}
body{
  min-height:100vh;
  background:radial-gradient(120% 60% at 50% -10%, #FBE9C9 0%, rgba(251,233,201,0) 55%), var(--paper);
  font-family:'Archivo',system-ui,sans-serif; color:var(--ink);
  display:flex; justify-content:center; padding:18px 14px 40px; -webkit-font-smoothing:antialiased;
}
.phone{ width:100%; max-width:430px; }

.head{ text-align:center; margin:6px 0 16px; position:relative; }
.logo{ display:inline-flex; align-items:center; gap:8px; }
.logo-mark{ font-size:26px; line-height:1; color:var(--grape); transform:rotate(-20deg); display:inline-block; }
.logo-word{ font-family:'Archivo Black',sans-serif; font-size:27px; letter-spacing:-.5px; }
.tag{ margin:4px 0 0; font-size:13px; font-weight:600; color:#6c6760; letter-spacing:.2px; }
.lang{ position:absolute; top:0; right:0; display:flex; border:1.5px solid var(--ink); border-radius:9px; overflow:hidden; }
.lang button{ border:0; background:#fff; cursor:pointer; font-family:'Archivo',sans-serif; font-weight:800; font-size:12px; color:#6c6760; padding:6px 10px; }
.lang button.on{ background:var(--ink); color:#fff; }

.card{ background:var(--card); border:2px solid var(--ink); border-radius:18px; padding:14px; box-shadow:5px 6px 0 rgba(22,20,15,.10); }
.seg{ display:flex; gap:4px; background:#EFEDE6; border:1.5px solid var(--ink); border-radius:11px; padding:3px; margin-bottom:14px; }
.seg-btn{ flex:1; border:0; background:transparent; cursor:pointer; font-family:'Archivo',sans-serif; font-weight:700; font-size:14px; color:#6c6760; padding:9px 6px; border-radius:8px; transition:.15s; }
.seg-btn.on{ background:var(--ink); color:#fff; }

.pane{ display:none; }
.pane.on{ display:block; }
.scan{ display:flex; flex-direction:column; align-items:center; gap:10px; }
.shutter{ width:100%; border:2px dashed var(--grape); background:#F6F1FB; color:var(--grape); font-family:'Archivo',sans-serif; font-weight:800; font-size:16px; cursor:pointer; padding:22px 12px; border-radius:14px; display:flex; align-items:center; justify-content:center; gap:9px; transition:.15s; }
.shutter:hover:not(:disabled){ background:#EFE6FA; }
.shutter:disabled{ cursor:default; border-style:solid; color:#8a8a8a; background:#f2f2f0; }
.shutter-ic{ font-size:22px; line-height:1; }
.thumb{ width:100%; max-height:180px; object-fit:cover; border-radius:12px; border:1.5px solid var(--ink); }
.hint{ font-size:12.5px; color:#777169; margin:0; text-align:center; }
.hint b{ color:var(--ink); }
.progress{ width:100%; height:8px; background:#EDE9F4; border-radius:99px; overflow:hidden; border:1px solid #d9d2ea; }
.progress > i{ display:block; height:100%; width:0%; background:var(--grape); transition:width .25s; }
.progress-lbl{ font-size:12px; font-weight:700; color:var(--grape); margin:0; }

.paste{ display:flex; flex-direction:column; gap:10px; }
.ta{ width:100%; border:1.5px solid var(--ink); border-radius:12px; padding:12px; font-family:'Archivo',sans-serif; font-size:14.5px; line-height:1.45; resize:vertical; background:#FCFBF8; color:var(--ink); }
.ta:focus{ outline:3px solid #D9C7F0; outline-offset:1px; }
.go{ border:0; background:var(--grape); color:#fff; cursor:pointer; font-family:'Archivo',sans-serif; font-weight:800; font-size:15.5px; padding:13px; border-radius:12px; transition:.15s; }
.go:hover{ background:#5b3189; }

.ex{ margin-top:14px; padding-top:12px; border-top:1.5px dashed #ddd8cf; }
.ex-label{ font-size:12px; font-weight:700; color:#8a847b; text-transform:uppercase; letter-spacing:.5px; }
.ex-chips{ display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; }
.chip{ border:1.5px solid var(--ink); background:#fff; color:var(--ink); cursor:pointer; font-family:'Archivo',sans-serif; font-weight:600; font-size:12.5px; padding:6px 11px; border-radius:999px; transition:.12s; }
.chip:hover{ background:var(--ink); color:#fff; }

.error{ margin-top:14px; background:#F6E7E4; border:1.5px solid #B23B2E; color:#8a2c22; border-radius:12px; padding:12px 14px; font-size:13.5px; font-weight:600; }

.panel{ margin-top:16px; background:#fff; border:2px solid var(--ink); border-radius:6px; padding:14px 16px 16px; box-shadow:5px 6px 0 rgba(22,20,15,.10); animation:pop .25s ease both; }
@keyframes pop{ from{ opacity:0; transform:translateY(8px);} to{ opacity:1; transform:none;} }
.panel-title{ font-family:'Archivo Black',sans-serif; font-size:30px; letter-spacing:-.6px; line-height:.95; text-transform:uppercase; }
.rule{ background:var(--ink); border-radius:2px; }
.rule-xl{ height:9px; margin:7px 0; }
.rule-lg{ height:4px; margin:11px 0; }
.verdict-txt{ font-family:'Archivo Black',sans-serif; font-size:23px; letter-spacing:-.3px; }
.counts{ display:flex; align-items:center; gap:7px; font-size:14px; font-weight:600; color:#555049; margin-top:2px; }
.counts b{ font-family:'Archivo Black',sans-serif; font-size:18px; }
.counts-sep{ color:#bbb; }
.clean{ display:flex; gap:11px; align-items:flex-start; padding:4px 0; }
.clean-ic{ flex:none; width:30px; height:30px; border-radius:50%; background:var(--green); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:17px; }
.clean p{ margin:3px 0 0; font-size:14px; line-height:1.45; color:#3c3833; }
.list{ list-style:none; margin:0; padding:0; }
.item{ padding:12px 0; border-bottom:1px solid #e7e3da; }
.item:last-child{ border-bottom:0; padding-bottom:2px; }
.item-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.item-name{ font-weight:800; font-size:16px; letter-spacing:-.2px; }
.badge{ flex:none; font-weight:800; font-size:11px; text-transform:uppercase; letter-spacing:.6px; padding:4px 9px; border-radius:999px; }
.item-cat{ font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#9a948b; margin-top:2px; }
.item-sum{ margin:6px 0 4px; font-size:14.5px; font-weight:700; color:#2a2722; line-height:1.35; }
.item-det{ margin:0 0 8px; font-size:13.5px; color:#5a554e; line-height:1.5; }
.item-status{ display:inline-block; font-size:11.5px; font-weight:700; border:1.5px solid; border-radius:6px; padding:3px 8px; }
.key{ display:flex; flex-wrap:wrap; gap:12px; }
.key-item{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; color:#555; }
.key-item i{ width:11px; height:11px; border-radius:3px; display:inline-block; }
.insight{ margin-top:13px; }
.insight-box{ background:#F6F1FB; border:1.5px solid var(--grape); border-radius:12px; padding:12px 14px; }
.insight-h{ font-family:'Archivo Black',sans-serif; font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--grape); margin-bottom:5px; }
.insight-box p{ margin:0; font-size:14px; line-height:1.55; color:#3a3340; }
.foot{ margin-top:18px; padding:0 4px; }
.foot p{ font-size:11.5px; line-height:1.55; color:#857f76; margin:0; text-align:center; }
.foot b{ color:#5a554e; }
:focus-visible{ outline:3px solid #D9C7F0; outline-offset:2px; border-radius:6px; }
@media (prefers-reduced-motion:reduce){ .panel{ animation:none !important; } }
</style>
</head>
<body>
<div class="phone">
  <header class="head">
    <div class="lang" id="lang">
      <button data-l="ms" class="on">BM</button>
      <button data-l="en">EN</button>
    </div>
    <div class="logo"><span class="logo-mark">◓</span><span class="logo-word">Snackwise</span></div>
    <p class="tag" id="tag"></p>
  </header>

  <section class="card">
    <div class="seg" role="tablist">
      <button class="seg-btn on" id="tab-scan" role="tab"></button>
      <button class="seg-btn" id="tab-paste" role="tab"></button>
    </div>

    <div class="pane on scan" id="pane-scan">
      <input type="file" accept="image/*" capture="environment" id="file" hidden />
      <button class="shutter" id="shutterBtn"><span class="shutter-ic">⌖</span><span id="shutterTxt"></span></button>
      <div id="ocrProgress" style="width:100%; display:none; flex-direction:column; gap:6px;">
        <p class="progress-lbl" id="ocrLabel"></p>
        <div class="progress"><i id="ocrBar"></i></div>
      </div>
      <img id="thumb" class="thumb" style="display:none;" />
      <p class="hint" id="hint"></p>
    </div>

    <div class="pane paste" id="pane-paste">
      <textarea class="ta" id="ta" rows="5"></textarea>
      <button class="go" id="checkBtn"></button>
    </div>

    <div class="ex">
      <span class="ex-label" id="exLabel"></span>
      <div class="ex-chips" id="chips"></div>
    </div>
  </section>

  <div id="errorBox"></div>
  <div id="results"></div>

  <footer class="foot"><p id="foot"></p></footer>
</div>

const LEVELS={
  avoid:{rank:3,color:"#B23B2E",tint:"#F6E7E4",label:{en:"Avoid",ms:"Elak"}},
  caution:{rank:2,color:"#B26A1B",tint:"#F7ECDC",label:{en:"Caution",ms:"Awas"}},
  watch:{rank:1,color:"#4F6D8A",tint:"#E8EEF3",label:{en:"Watch",ms:"Pantau"}},
};

/* =================== state =================== */
let LANG="ms";
let lastRes=null;
const T=()=>I18N[LANG];

/* =================== engine (language-neutral) =================== */
function analyze(raw){
  const lower=(raw||"").toLowerCase();
  if(!lower.trim()) return null;
  const text=lower.replace(/\b(?:e|ins)[\s\-\.]?(\d{3,4})/g,"e$1"); // E/INS 3–4 digit, incl "INS 322(i)"
  const found=[];
  for(const item of DB){ if(item.aliases.some(a=>text.includes(a))) found.push(item); }
  const seen=new Set();
  const flagged=found.filter(f=> seen.has(f.id)?false:seen.add(f.id));
  flagged.sort((a,b)=>LEVELS[b.level].rank-LEVELS[a.level].rank);
  const tokens=text.replace(/\([^)]*\)/g,",").split(/[,;\n•]/)
    .map(t=>t.replace(/contains \d+% or less of:?/g,"").replace(/mengandungi \d+% atau kurang(?: daripada)?:?/g,"").trim())
    .filter(t=>t.length>1 && !/^\d+%?$/.test(t));
  const totalRead=Math.max(tokens.length,flagged.length);
  const maxRank=flagged.reduce((m,f)=>Math.max(m,LEVELS[f.level].rank),0);
  return {flagged,totalRead,maxRank};
}

function localTake(res){
  const t=T();
  const lead = res.maxRank===3?t.take3 : res.maxRank===2?t.take2 : t.take1;
  return lead + t.takeTail;
}

/* =================== render =================== */
function esc(s){ return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

function renderResults(res){
  if(!res){ document.getElementById("results").innerHTML=""; return; }
  const t=T();
  let verdict;
  if(res.flagged.length===0) verdict={title:t.vClean,color:"#1F7A4D"};
  else if(res.maxRank===3) verdict={title:t.vAvoid,color:"#B23B2E"};
  else if(res.maxRank===2) verdict={title:t.vCaution,color:"#B26A1B"};
  else verdict={title:t.vWatch,color:"#4F6D8A"};

  const keyHtml = Object.entries(LEVELS).sort((a,b)=>b[1].rank-a[1].rank)
    .map(([k,L])=>`<span class="key-item"><i style="background:${L.color}"></i> ${L.label[LANG]}</span>`).join("")
    + `<span class="key-item"><i style="background:#1F7A4D"></i> ${t.keyClean}</span>`;

  let body;
  if(res.flagged.length===0){
    body=`<div class="clean"><span class="clean-ic">✓</span><p>${esc(t.cleanMsg)}</p></div>`;
  } else {
    body=`<ul class="list">`+res.flagged.map(f=>{
      const L=LEVELS[f.level], d=f[LANG];
      return `<li class="item">
        <div class="item-top"><span class="item-name">${esc(d.name)}</span>
        <span class="badge" style="color:${L.color};background:${L.tint}">${L.label[LANG]}</span></div>
        <div class="item-cat">${esc(d.cat)}</div>
        <p class="item-sum">${esc(d.summary)}</p>
        <p class="item-det">${esc(d.detail)}</p>
        <div class="item-status" style="border-color:${L.color};color:${L.color}">${esc(d.status)}</div>
      </li>`;
    }).join("")+`</ul>`;
  }

  const insight = res.flagged.length>0
    ? `<div class="insight"><div class="insight-box"><div class="insight-h">${esc(t.insightH)}</div><p>${esc(localTake(res))}</p></div></div>`
    : "";

  document.getElementById("results").innerHTML=`<section class="panel">
    <div class="panel-title">${esc(t.panelTitle)}</div>
    <div class="rule rule-xl"></div>
    <div><span class="verdict-txt" style="color:${verdict.color}">${esc(verdict.title)}</span></div>
    <div class="counts"><span><b style="color:${verdict.color}">${res.flagged.length}</b> ${esc(t.flagged)}</span>
      <span class="counts-sep">·</span><span>${res.totalRead} ${esc(t.read)}</span></div>
    <div class="rule rule-lg"></div>
    ${body}
    <div class="rule rule-lg"></div>
    <div class="key">${keyHtml}</div>
    ${insight}
  </section>`;
}

function showError(msg){ document.getElementById("errorBox").innerHTML=`<div class="error">${esc(msg)}</div>`; }
function clearOut(){ document.getElementById("results").innerHTML=""; document.getElementById("errorBox").innerHTML=""; lastRes=null; }

/* =================== language =================== */
function buildChips(){
  const chips=document.getElementById("chips"); chips.innerHTML="";
  T().examples.forEach(ex=>{
    const b=document.createElement("button"); b.className="chip"; b.textContent=ex.name;
    b.onclick=()=>{ setTab(false); document.getElementById("ta").value=ex.text; document.getElementById("errorBox").innerHTML=""; lastRes=analyze(ex.text); renderResults(lastRes); };
    chips.appendChild(b);
  });
}

function applyLang(){
  const t=T();
  document.documentElement.lang=LANG;
  document.getElementById("tag").textContent=t.tag;
  document.getElementById("tab-scan").textContent=t.scan;
  document.getElementById("tab-paste").textContent=t.paste;
  document.getElementById("shutterTxt").textContent=" "+t.shutter;
  document.getElementById("hint").innerHTML=t.hint;
  document.getElementById("thumb").alt=t.thumbAlt;
  document.getElementById("ta").placeholder=t.placeholder;
  document.getElementById("checkBtn").textContent=t.check;
  document.getElementById("exLabel").textContent=t.noLabel;
  document.getElementById("foot").innerHTML=t.foot;
  buildChips();
  renderResults(lastRes);
  document.querySelectorAll("#lang button").forEach(b=>b.classList.toggle("on", b.dataset.l===LANG));
}

document.querySelectorAll("#lang button").forEach(b=>{
  b.onclick=()=>{ LANG=b.dataset.l; applyLang(); };
});

/* =================== tabs =================== */
const tabScan=document.getElementById("tab-scan"), tabPaste=document.getElementById("tab-paste");
const paneScan=document.getElementById("pane-scan"), panePaste=document.getElementById("pane-paste");
function setTab(scan){
  tabScan.classList.toggle("on",scan); tabPaste.classList.toggle("on",!scan);
  paneScan.classList.toggle("on",scan); panePaste.classList.toggle("on",!scan);
}
tabScan.onclick=()=>setTab(true);
tabPaste.onclick=()=>setTab(false);

/* =================== paste =================== */
document.getElementById("checkBtn").onclick=()=>{
  clearOut();
  lastRes=analyze(document.getElementById("ta").value);
  if(!lastRes){ showError(T().errEmpty); return; }
  renderResults(lastRes);
};

/* =================== scan (free on-device OCR) =================== */
const fileInput=document.getElementById("file");
const shutterBtn=document.getElementById("shutterBtn");
const thumb=document.getElementById("thumb");
const ocrProgress=document.getElementById("ocrProgress");
const ocrBar=document.getElementById("ocrBar");
const ocrLabel=document.getElementById("ocrLabel");

shutterBtn.onclick=()=>fileInput.click();

fileInput.onchange=async(e)=>{
  const file=e.target.files&&e.target.files[0];
  if(!file) return;
  clearOut();
  shutterBtn.disabled=true; thumb.style.display="none";
  ocrProgress.style.display="flex"; ocrBar.style.width="4%"; ocrLabel.textContent=T().ocrPrep;
  try{
    const prepped=await prepImage(file);
    thumb.src=prepped.preview; thumb.style.display="block";
    const worker=await Tesseract.createWorker("eng",1,{
      logger:m=>{
        if(m.status==="recognizing text"){ ocrLabel.textContent=T().ocrRead; ocrBar.style.width=Math.max(8,Math.round(m.progress*100))+"%"; }
        else { ocrLabel.textContent=T().ocrPrep; }
      }
    });
    const {data}=await worker.recognize(prepped.canvas);
    await worker.terminate();
    ocrBar.style.width="100%";
    const text=(data.text||"").replace(/\s+/g," ").trim();
    lastRes=analyze(text);
    if(!lastRes || (lastRes.flagged.length===0 && text.length<12)){
      lastRes=null; showError(T().errNoRead);
    } else {
      document.getElementById("ta").value=text;
      renderResults(lastRes);
    }
  }catch(err){
    showError(T().errRun);
  }finally{
    shutterBtn.disabled=false;
    setTimeout(()=>{ ocrProgress.style.display="none"; },600);
    fileInput.value="";
  }
};

function prepImage(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const maxDim=1600; let {width,height}=img;
        const scale=Math.min(2, maxDim/Math.max(width,height));
        width=Math.round(width*scale); height=Math.round(height*scale);
        const canvas=document.createElement("canvas"); canvas.width=width; canvas.height=height;
        const ctx=canvas.getContext("2d"); ctx.drawImage(img,0,0,width,height);
        const d=ctx.getImageData(0,0,width,height), px=d.data;
        for(let i=0;i<px.length;i+=4){ let g=0.299*px[i]+0.587*px[i+1]+0.114*px[i+2]; g=(g-128)*1.25+128; g=g<0?0:g>255?255:g; px[i]=px[i+1]=px[i+2]=g; }
        ctx.putImageData(d,0,0);
        resolve({canvas, preview:canvas.toDataURL("image/jpeg",0.85)});
      };
      img.onerror=reject; img.src=ev.target.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}

/* init */
applyLang();
